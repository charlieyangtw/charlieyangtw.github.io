<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專案管理顯示中心</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* 簡單的版面基本高度設定 */
        .main-container { height: calc(100vh - 70px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans overflow-hidden">

    <header class="bg-white border-b border-gray-200 h-[70px] px-6 flex items-center justify-between shadow-xs">
        <h1 id="site-title" class="text-xl font-bold text-gray-900">
            📌 專案管理顯示中心 </h1>
        <span class="text-xs text-green-600 bg-green-50 border border-green-200 px-2 py-1 rounded-sm">
            ● 連線至 Google 試算表
        </span>
    </header>

    <div class="max-w-8xl mx-auto flex main-container">
        
		<!-- 左側：列表 -->
		<aside class="w-1/3 border-r border-gray-200 bg-white overflow-y-auto p-4">
			<!-- 原本的「專案主旨清單」修改為「列表」 -->
			<h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">列表</h2>
			<div id="subject-list" class="space-y-2">
				<p class="text-sm text-gray-500 animate-pulse">資料載入中...</p>
			</div>
		</aside>

        <main class="w-2/3 flex flex-col h-full bg-gray-50/50">
            
            <section class="p-6 bg-white border-b border-gray-200 shadow-2xs">
                <div class="flex justify-between items-start gap-4 mb-2">
                    <h2 id="detail-title" class="text-lg font-bold text-gray-900">請選擇左側項目</h2>
                    <span id="detail-date" class="text-xs text-gray-400 whitespace-nowrap"></span>
                </div>
                <div id="detail-desc" class="text-sm text-gray-600 leading-relaxed whitespace-pre-line">
                    點擊左側的主旨，即可在此查看詳細的專案描述與內嵌 HTML 內容。
                </div>
            </section>

            <section class="flex-1 p-6 overflow-y-auto">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">內崁 HTML 預覽</h3>
                <div id="detail-html" class="bg-white p-4 rounded-lg border border-gray-200 min-h-[200px] shadow-2xs">
                    <p class="text-xs text-gray-400 italic">暫無內嵌內容</p>
                </div>
            </section>

        </main>
    </div>

    <script>
        // ======= 🛠️ 請在此處貼上你在步驟 1 複製的 Google 試算表 CSV 網址 =======
        const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRDLk_cATMmyuBpYBj9ky-snNltxCM4jb45B_6WjhhqUPCgPgE16cfhCATIFoSeEP-4DWwDURCQ2Ql3/pub?output=csv";

        let projectData = []; // 這裡未來只儲存 功能為 1 的清單資料

		async function loadSpreadsheetData() {
			try {
				const response = await fetch(SPREADSHEET_CSV_URL);
				const csvText = await response.text();
				
				// 解析 CSV 得到所有原始資料（如果你是用 PapaParse，請換成 results.data）
				let rawData = parseCSV(csvText); 

				// ----------------------------------------------------
				// 核心邏輯 A：動態替換網站首頁標題 (功能=0, 主旨=Title)
				// ----------------------------------------------------
				const configRow = rawData.find(item => 
					String(item['功能']).trim() === '0' && 
					String(item['主旨']).trim() === 'Title'
				);
				
				if (configRow && configRow['內崁html儲存']) {
					// 將右側原本的文字替換成試算表裡設定的 HTML 內容
					document.getElementById('site-title').innerHTML = configRow['內崁html儲存'];
				}

				// ----------------------------------------------------
				// 核心邏輯 B：過濾並排序清單列表 (功能=1)
				// ----------------------------------------------------
				projectData = rawData.filter(item => String(item['功能']).trim() === '1');
				
				// 依據「排序」欄位由小到大排列
				projectData.sort((a, b) => Number(a['排序'] || 0) - Number(b['排序'] || 0));
				
				renderSubjectList();
			} catch (error) {
				console.error("資料載入失敗:", error);
				document.getElementById('subject-list').innerHTML = `<p class="text-sm text-red-500">❌ 資料載入失敗，請檢查網址或發布設定。</p>`;
			}
		}

		// 渲染左側列表（只會顯示功能為 1 的項目）
		function renderSubjectList() {
			const container = document.getElementById('subject-list');
			if (projectData.length === 0) {
				container.innerHTML = `<p class="text-sm text-gray-400">目前列表沒有資料。</p>`;
				return;
			}

			container.innerHTML = projectData.map((item, index) => `
				<button onclick="showDetail(${index})" class="w-full text-left p-3 rounded-lg border border-gray-100 hover:bg-blue-50/50 hover:border-blue-200 transition cursor-pointer block group">
					<div class="font-medium text-sm text-gray-800 group-hover:text-blue-600 transition truncate">${item['主旨']}</div>
					<div class="text-[11px] text-gray-400 mt-1">排序: ${item['排序'] || 0}</div>
				</button>
			`).join('');
			
			// 預設自動選取並開啟第一筆清單內容
			showDetail(0);
		}

        // 點擊左側，切換右側顯示內容
        function showDetail(index) {
            const item = projectData[index];
            if (!item) return;

            document.getElementById('detail-title').innerText = item['主旨'];
            document.getElementById('detail-date').innerText = item['建立日期時間'] ? `📅 ${item['建立日期時間']}` : '';
            document.getElementById('detail-desc').innerText = item['描述'] || '無描述';
            
            // 渲染內崁 HTML (使用 innerHTML)
            const htmlContainer = document.getElementById('detail-html');
            if (item['內崁html儲存']) {
                htmlContainer.innerHTML = item['內崁html儲存'];
            } else {
                htmlContainer.innerHTML = `<p class="text-xs text-gray-400 italic">此項目無內嵌 HTML 內容</p>`;
            }
        }

        // 初始化啟動
        loadSpreadsheetData();
    </script>
</body>
</html>
